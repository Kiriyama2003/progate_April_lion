version: 1
backend:
  phases:
    build:
      commands:
        - cd backend
        - sam build
        # 🌟 超重要：スタック名（--stack-name）をお友達専用の名前に変更する！
        # 例: honban ではなく friend-env などにする
        - sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name friend-env --region us-east-1 --capabilities CAPABILITY_IAM --resolve-s3
frontend:
  phases:
    preBuild:
      commands:
        # 1. 最初に設定ファイルを作る
        - echo "$AMPLIFYCONFIG" > frontend/lib/amplifyconfiguration.dart
        
        # 2. Flutterの準備
        - git clone https://github.com/flutter/flutter.git -b stable
        - export PATH="$PATH:`pwd`/flutter/bin"
        
        # 🌟 3. ここで「1回だけ」frontendフォルダに入る！
        - cd frontend
        
        # 4. すでに中にいるので、あとは普通にコマンドを打つだけ
        - flutter config --enable-web
        - flutter pub get
    build:
      commands:
        # 🌟 buildフェーズはまた一番上からスタートするので、もう一度入る
        - cd frontend
        - flutter build web --release
  artifacts:
    baseDirectory: frontend/build/web
    files:
      - '**/*'
  cache:
    paths:
      - frontend/.pub-cache/**/*
      - flutter/**/*