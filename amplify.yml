version: 1
backend:
  phases:
    build:
      commands:
        # AWS SAMを使ってバックエンドをデプロイ
        - cd backend
        - sam build
        - sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name my-backend-stack
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - flutter pub get
    build:
      commands:
        - flutter build web
  artifacts:
    baseDirectory: frontend/build/web
    files:
      - '**/*'
  cache:
    paths:
      - frontend/.pub-cache/**/*