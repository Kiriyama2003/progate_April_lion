AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Gao Gao Savannah Backend

# ------------------------------------------------------------
# 1. CORSを全リソースで許可するための設定（追加）
# ------------------------------------------------------------
Globals:
  Function:
    Timeout: 60
  Api:
    Cors:
      AllowMethods: "'*'"
      AllowHeaders: "'*'"
      AllowOrigin: "'*'"

Resources:
  # 1. 音声保存バケット
  SavannahBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "gaogao-savannah-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']

  # 2. 投稿データDB
  RoarTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: postId, Type: String }

  # 3. ユーザー認証 (Cognito)
  GaoGaoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]

  GaoGaoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref GaoGaoUserPool
      ClientName: GaoGaoAppClient

  # 4. Lambda関数
  GaoGaoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: roar_function/
      Handler: app.lambda_handler
      Runtime: python3.11
      Timeout: 60
      Environment:
        Variables:
          TABLE_NAME: !Ref RoarTable
          BUCKET_NAME: !Ref SavannahBucket
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref RoarTable }
        - S3FullAccessPolicy: { BucketName: !Ref SavannahBucket }
        - AmazonBedrockFullAccess # AI用
      Events:
        PostRoar:
          Type: Api
          Properties:
            Path: /roars
            Method: post
            RestApiId: !Ref ServerlessRestApi # 👈 CORS設定を有効にするために追加
        GetTimeline:
          Type: Api
          Properties:
            Path: /timeline
            Method: get
            RestApiId: !Ref ServerlessRestApi # 👈 CORS設定を有効にするために追加

  # --- アイデンティティプール設定 ---
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      AllowUnauthenticatedIdentities: true
      CognitoIdentityProviders:
        - ClientId: !Ref GaoGaoUserPoolClient
          ProviderName: !GetAtt GaoGaoUserPool.ProviderName

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        unauthenticated: !GetAtt UnauthRole.Arn
        authenticated: !GetAtt AuthRole.Arn

  # ゲスト用の権限
  UnauthRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref IdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ["s3:PutObject", "s3:GetObject"]
                Resource: !Sub "arn:aws:s3:::${SavannahBucket}/*"

  # ログインユーザー用の権限
  AuthRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref IdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ["s3:PutObject", "s3:GetObject"]
                Resource: !Sub "arn:aws:s3:::${SavannahBucket}/*"

Outputs:
  ApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  UserPoolId:
    Value: !Ref GaoGaoUserPool
  ClientId:
    Value: !Ref GaoGaoUserPoolClient
  IdentityPoolId:
    Value: !Ref IdentityPool