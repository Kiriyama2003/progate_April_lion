name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # mainにpushされたら自動実行

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Flutterのセットアップ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.x' # 最新の安定版を使用

      # 2. 依存関係の解決
      - name: Install dependencies
        run: flutter pub get

      # 3. Web用のビルド (重要: base-href をリポジトリ名に合わせる)
      - name: Build Web
        run: flutter build web --release --base-href /${{ github.event.repository.name }}/

      # 4. GitHub Pagesへアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      # 5. デプロイ実行
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4